[package]
name = "meridian-prompter"
version = "0.3.8"
description = "Workflow for creating and improving LLM agents and skills from first principles — research-backed design principles, writers, reviewers, and testers."

[dependencies.meridian-base]
url = "https://github.com/haowjy/meridian-base"
skills = [
    "grill",
    "grill-with-evidence",
    "intent-modeling",
    "llm-writing",
    "session-mining",
]

[settings]
targets = [
    ".codex",
    ".claude",
    ".opencode",
]
models_cache_ttl_hours = 24
